<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RimCombat Weapon Art HUD</title>
    <link rel="stylesheet" href="hud.css" />
</head>

<body>
    <div class="hud-anchor" id="hud-anchor">
        <section class="hud-shell is-disabled" id="hud-shell">
            <div class="hud-crest" aria-hidden="true">
                <span class="crest-core"></span>
                <span class="crest-frame"></span>
            </div>
            <div class="hud-body">
                <p class="hud-kicker" id="hud-label">战技</p>
                <h1 class="hud-name" id="hud-name"></h1>
                <div class="hud-status-row">
                    <span class="hud-status" id="hud-status"></span>
                </div>
            </div>
        </section>
    </div>
    <script src="hud.js"></script>
</body>

</html>
