<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RimCombat Weapon Arts</title>
    <link rel="stylesheet" href="menu.css" />
</head>

<body>
    <main class="shell">
        <div class="mist mist-top"></div>
        <div class="mist mist-bottom"></div>

        <header class="status-bar panel-frame">
            <div class="title-cluster">
                <p class="section-kicker" id="menu-brand">RimCombat</p>
                <h1 id="menu-title">Weapon Arts</h1>
            </div>

            <div class="resource-strip">
                <article class="resource-card">
                    <span class="resource-label" id="level-label">Level</span>
                    <strong id="player-level">1</strong>
                </article>
                <article class="resource-card">
                    <span class="resource-label" id="points-label">Points</span>
                    <strong id="player-points">0</strong>
                </article>
            </div>

            <button id="close-button" class="close-button" type="button">
                Close
            </button>
        </header>

        <section class="summary-row">
            <article class="summary-panel panel-frame" id="weapon-panel"></article>
            <article class="summary-panel panel-frame" id="detail-panel"></article>
        </section>

        <section class="catalog-panel panel-frame">
            <div class="catalog-header">
                <div>
                    <p class="section-kicker" id="catalog-kicker">Catalog</p>
                    <h2 id="catalog-title">All Weapon Arts</h2>
                </div>
                <span id="art-count" class="count-badge">0 Arts</span>
            </div>
            <p class="catalog-note" id="catalog-note">
                Select a weapon art below. The upper panels show the selected weapon and the highlighted art.
            </p>
            <div id="art-list" class="art-grid"></div>
        </section>
    </main>

    <script src="menu.js"></script>
</body>

</html>
